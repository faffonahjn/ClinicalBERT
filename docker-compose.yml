# docker-compose.yml
version: '3.8'

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clinicalbert_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./processed:/app/processed
    networks:
      - clinicalbert_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: clinicalbert_ui
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    networks:
      - clinicalbert_network
    restart: unless-stopped
    environment:
      - API_URL=http://fastapi:8000

networks:
  clinicalbert_network:
    driver: bridge